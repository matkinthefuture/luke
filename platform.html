<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贷后策略运营平台 v3.0</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f3f7fb;
  --card:#ffffff;
  --text:#172033;
  --sub:#667085;
  --line:#e6ebf3;
  --blue:#2563eb;
  --blue2:#1d4ed8;
  --green:#059669;
  --orange:#d97706;
  --red:#dc2626;
  --purple:#7c3aed;
  --side:#0f172a;
  --shadow:0 10px 30px rgba(15,23,42,.08);
  --radius:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.side{position:fixed;left:0;top:0;width:248px;height:100vh;background:linear-gradient(180deg,#0f172a 0%,#111827 100%);color:#fff;display:flex;flex-direction:column;z-index:20}
.brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand h1{font-size:17px;display:flex;gap:8px;align-items:center}
.brand p{margin-top:10px;font-size:11px;line-height:1.75;color:#94a3b8}
.nav{flex:1;overflow:auto;padding:10px 0}
.nav-group{padding:10px 20px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#64748b}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#d1d5db;border-left:3px solid transparent;cursor:pointer;transition:.2s;font-size:13px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(37,99,235,.14);color:#93c5fd;border-left-color:#60a5fa}
.side-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#94a3b8;line-height:1.7}
.header{position:fixed;left:248px;right:0;top:0;height:62px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:15}
.path{font-size:14px;color:var(--sub)}
.path b{color:var(--text)}
.head-meta{display:flex;gap:10px;align-items:center;color:var(--sub);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
.badge.blue{background:#dbeafe;color:#1d4ed8}
.badge.green{background:#d1fae5;color:#047857}
.badge.orange{background:#fef3c7;color:#b45309}
.badge.red{background:#fee2e2;color:#b91c1c}
.main{margin-left:248px;padding:86px 24px 32px;min-height:100vh}
.hero{background:linear-gradient(135deg,#1d4ed8,#2563eb 58%,#38bdf8);border-radius:22px;color:#fff;padding:26px 28px;box-shadow:var(--shadow);margin-bottom:18px}
.hero h2{font-size:24px;margin-bottom:10px}
.hero p{max-width:980px;font-size:13px;line-height:1.9;color:#dbeafe}
.hero-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-top:18px}
.hero-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px}
.hero-box h3{font-size:14px;margin-bottom:8px}
.hero-box ul{padding-left:18px;color:#eff6ff;font-size:12px;line-height:1.85}
.grid{display:grid;gap:16px;margin-bottom:18px}
.grid.kpi{grid-template-columns:repeat(6,1fr)}
.grid.two{grid-template-columns:1.15fr .85fr}
.grid.equal{grid-template-columns:1fr 1fr}
.grid.three{grid-template-columns:repeat(3,1fr)}
.grid.four{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.title{font-size:16px;font-weight:800;margin-bottom:10px}
.sub{font-size:12px;line-height:1.8;color:var(--sub)}
.kpi-card{position:relative;overflow:hidden}
.kpi-card:before{content:"";position:absolute;left:0;right:0;top:0;height:4px;background:var(--blue)}
.kpi-card.red:before{background:var(--red)}
.kpi-card.green:before{background:var(--green)}
.kpi-card.orange:before{background:var(--orange)}
.kpi-card.purple:before{background:var(--purple)}
.kpi-label{font-size:12px;color:var(--sub);margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;margin-bottom:4px}
.kpi-change{font-size:12px;font-weight:700}
.kpi-change.good{color:var(--green)}
.kpi-change.bad{color:var(--red)}
.spark{height:34px;margin-top:8px}
.chart{height:320px;width:100%}
.chart.sm{height:250px}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.issue-list{display:grid;gap:12px}
.issue{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff}
.issue h4{font-size:14px;margin-bottom:8px}
.issue p{font-size:12px;color:var(--sub);line-height:1.8}
.kv{display:grid;grid-template-columns:72px 1fr;gap:10px;margin-top:8px;font-size:12px}
.kv b{color:var(--text)}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
.metric{padding:14px;border-radius:14px;background:#f8fbff;border:1px solid var(--line)}
.metric .label{font-size:12px;color:var(--sub);margin-bottom:6px}
.metric .value{font-size:24px;font-weight:800}
.metric .desc{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.75}
.flow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.flow .step{padding:14px;border-radius:14px;border:1px solid var(--line);background:#f8fbff;position:relative}
.flow .step:not(:last-child):after{content:"→";position:absolute;right:-11px;top:50%;transform:translateY(-50%);font-size:18px;color:#94a3b8}
.flow .num{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-bottom:8px}
.flow h5{font-size:13px;margin-bottom:4px}
.flow p{font-size:12px;color:var(--sub);line-height:1.7}
.notice{display:flex;gap:12px;align-items:flex-start;margin-top:14px;padding:14px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa}
.notice p{font-size:12px;line-height:1.8;color:#9a3412}
.notice .icon{font-size:18px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;cursor:pointer;transition:.2s}
.tab.active,.tab:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.attrib-dims{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.attrib-dim{padding:8px 14px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:12px;cursor:pointer;transition:.2s;font-weight:600}
.attrib-dim.active{background:linear-gradient(135deg,#2563eb,#38bdf8);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(37,99,235,.25)}
.attrib-dim:hover:not(.active){border-color:var(--blue);color:var(--blue)}
.attrib-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.attrib-sum-card{padding:14px;border-radius:14px;border:1px solid var(--line);background:#f8fbff}
.attrib-sum-card .lab{font-size:11px;color:var(--sub);margin-bottom:4px}
.attrib-sum-card .val{font-size:22px;font-weight:800}
.attrib-sum-card .chg{font-size:11px;font-weight:700;margin-top:4px}
.attrib-sum-card .chg.bad{color:var(--red)}
.attrib-sum-card .chg.good{color:var(--green)}
.attrib-detail{border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-top:12px}
.attrib-detail table{width:100%;border-collapse:collapse;font-size:12px}
.attrib-detail th{background:#f1f5f9;padding:10px 12px;text-align:left;font-weight:700;border-bottom:1px solid var(--line)}
.attrib-detail td{padding:10px 12px;border-bottom:1px solid #f1f5f9}
.attrib-detail tr:last-child td{border-bottom:none}
.attrib-detail tr:hover td{background:#f8fbff}
.bar-inline{display:inline-block;height:8px;border-radius:4px;background:var(--blue);vertical-align:middle;margin-left:6px}
.attrib-insight{margin-top:14px;padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,#eff6ff,#f0f9ff);border:1px solid #bfdbfe}
.attrib-insight h4{font-size:13px;margin-bottom:8px;color:var(--blue2)}
.attrib-insight p{font-size:12px;line-height:1.9;color:#334155}
.attrib-action{margin-top:10px;padding:12px 16px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa}
.attrib-action h4{font-size:13px;margin-bottom:8px;color:#b45309}
.attrib-action p{font-size:12px;line-height:1.9;color:#9a3412}
.contrib-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;margin:10px 0}
.contrib-bar div{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;min-width:28px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}
.table{width:100%;border-collapse:collapse;font-size:12px;min-width:820px}
.table th{background:#eff6ff;color:#1e3a8a;font-weight:800;padding:10px;border-bottom:1px solid var(--line)}
.table td{padding:10px;border-bottom:1px solid var(--line);text-align:center;white-space:nowrap}
.table tr:nth-child(even){background:#fafcff}
.table tr:hover{background:#f3f6fb}
.stack{display:grid;gap:12px}
.panel{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff}
.panel h4{font-size:13px;margin-bottom:8px}
.panel ul{padding-left:18px;color:var(--sub);font-size:12px;line-height:1.85}
.panel p{font-size:12px;color:var(--sub);line-height:1.85}
.board{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}
.tree{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tree-col{padding:16px;border-radius:16px;background:#f8fbff;border:1px solid var(--line)}
.tree-col h4{font-size:13px;margin-bottom:10px}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:11px;font-weight:700;margin:0 6px 8px 0}
.release-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.release{padding:16px;border-radius:16px;border:1px solid var(--line);background:#fff}
.release h4{font-size:13px;margin-bottom:8px}
.release p{font-size:12px;color:var(--sub);line-height:1.8}
.release .tag{margin-top:10px;display:inline-flex;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:800}
.release .stable{background:#d1fae5;color:#047857}
.release .gray{background:#fef3c7;color:#b45309}
.release .plan{background:#dbeafe;color:#1d4ed8}
.matrix{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
.mcell{padding:12px;border-radius:14px;border:1px solid var(--line);background:#f8fbff;min-height:116px}
.mcell h5{font-size:12px;margin-bottom:6px}
.mcell p{font-size:11px;color:var(--sub);line-height:1.7}
.control{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.select, .input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:12px;color:var(--text)}
.label{font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:700}
.btn{padding:10px 14px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:12px;font-weight:800;cursor:pointer}
.btn:hover{background:var(--blue2)}
.toggle{display:flex;gap:8px;flex-wrap:wrap}
.toggle .chip{padding:7px 10px;border:1px solid var(--line);border-radius:999px;font-size:12px;background:#fff;cursor:pointer}
.toggle .chip.active{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8;font-weight:800}
.ai-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.ask{padding:14px;border:1px solid var(--line);border-radius:14px;background:#f8fbff;cursor:pointer;transition:.2s}
.ask:hover{transform:translateY(-1px);border-color:#93c5fd}
.ask h4{font-size:13px;margin-bottom:6px}
.ask p{font-size:12px;color:var(--sub);line-height:1.75}
.ai-result{padding:16px;border-radius:16px;background:linear-gradient(135deg,#eff6ff,#f8fbff);border:1px solid #bfdbfe}
.ai-block{margin-top:10px;padding:12px;border-radius:12px;background:#fff;border:1px solid #dbeafe}
.ai-block p{font-size:12px;color:var(--sub);line-height:1.85}
.timeline{display:grid;gap:10px}
.tl{display:grid;grid-template-columns:110px 1fr;gap:12px;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff}
.tl .left{font-size:12px;font-weight:800;color:#1d4ed8}
.tl .right{font-size:12px;color:var(--sub);line-height:1.8}
.case-grid{display:grid;grid-template-columns:320px 1fr;gap:16px}
.case-box{padding:16px;border-radius:16px;background:#f8fbff;border:1px solid var(--line)}
.case-box h4{font-size:13px;margin-bottom:8px}
.case-box p,.case-box li{font-size:12px;color:var(--sub);line-height:1.8}
.case-box ul{padding-left:18px}
.small{font-size:11px;color:var(--sub)}
@media(max-width:1480px){.grid.kpi{grid-template-columns:repeat(3,1fr)}.grid.two,.grid.equal,.board,.tree,.hero-grid,.case-grid{grid-template-columns:1fr}.metric-grid,.release-grid{grid-template-columns:repeat(2,1fr)}.flow{grid-template-columns:1fr 1fr}.flow .step:after{display:none}.matrix{grid-template-columns:repeat(3,1fr)}}
@media(max-width:980px){.side{position:static;width:100%;height:auto}.header{position:static;left:0;height:auto;padding:14px 18px;flex-direction:column;align-items:flex-start;gap:8px}.main{margin-left:0;padding:18px}.grid.kpi,.grid.three,.metric-grid,.release-grid,.ai-grid,.matrix,.flow,.control{grid-template-columns:1fr}.hero h2{font-size:20px}}
</style>
</head>
<body>
<div class="side">
  <div class="brand">
    <h1>🧭 贷后策略运营平台 v3.0</h1>
    <p>方向A增强版<br>重点强化：配置、灰度、归因、AI交互、客群 drill-down</p>
  </div>
  <div class="nav">
    <div class="nav-group">经营总览</div>
    <div class="nav-item active" onclick="switchPage('control',this)">🏠 经营控制台</div>
    <div class="nav-item" onclick="switchPage('value',this)">🎯 价值目标树</div>
    <div class="nav-group">核心经营</div>
    <div class="nav-item" onclick="switchPage('short',this)">⚡ 短逾期运营台</div>
    <div class="nav-item" onclick="switchPage('long',this)">🤝 协商经营中心</div>
    <div class="nav-item" onclick="switchPage('risk',this)">🛡️ 风险与客诉中枢</div>
    <div class="nav-group">策略与执行</div>
    <div class="nav-item" onclick="switchPage('lab',this)">🧩 策略实验室</div>
    <div class="nav-item" onclick="switchPage('release',this)">🚦 变更发布驾驶舱</div>
    <div class="nav-item" onclick="switchPage('case360',this)">👤 用户 360 视图</div>
    <div class="nav-item" onclick="switchPage('ai',this)">🤖 AI 经营副驾</div>

</div>

<div class="header">
  <div class="path">贷后策略运营平台 / <b id="pageTitle">经营控制台</b></div>
  <div class="head-meta">
    <span class="badge blue">2026年4月 增强版</span>

    <span>基于微信生态消费贷/现金贷贷后场景</span>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const charts = {};
const pageName = {

const d = {

  },
  problemMix:[

  valueMap:[

function disposeCharts(){
  Object.keys(charts).forEach(k=>{ try{ charts[k].dispose(); }catch(e){} delete charts[k]; });
}
function initChart(id){
  const dom = document.getElementById(id);
  if(!dom) return null;
  const c = echarts.init(dom);
  charts[id] = c;
  return c;
}
function spark(id,data,color){
  const c = initChart(id); if(!c) return;
  c.setOption({grid:{top:2,left:2,right:2,bottom:2},xAxis:{type:'category',show:false,data:data.map((_,i)=>i)},yAxis:{type:'value',show:false,min:'dataMin',max:'dataMax'},series:[{type:'line',smooth:true,symbol:'none',data:data,lineStyle:{width:2,color:color},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:color.replace('rgb','rgba').replace(')',',.18)')},{offset:1,color:'rgba(255,255,255,0)'}]}}}]});
}
function switchPage(page,el){
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('pageTitle').textContent = pageName[page] || '';
  disposeCharts();
  render(page);
}
function render(page){
  if(page==='control') return renderControl();
  if(page==='value') return renderValue();
  if(page==='short') return renderShort();
  if(page==='long') return renderLong();
  if(page==='risk') return renderRisk();
  if(page==='lab') return renderLab();
  if(page==='release') return renderRelease();
  if(page==='case360') return renderCase360();
  if(page==='ai') return renderAI();
  if(page==='attrib') return renderAttrib();
}

function updateStrategy(key,val){ app.strategy[key]=val; disposeCharts(); renderLab(); }
function strategyScore(){
  const s = app.strategy;
  let recovery = 0.5, complaint = 0.02, roi = 1.1, manual = 0.8;
  if(s.segment==='高风险大金额'){ recovery+=0.4; complaint+=0.01; roi+=0.25; manual+=0.25; }
  if(s.segment==='首逾高额度'){ recovery+=0.25; complaint+=0.005; roi+=0.18; }
  if(s.stage==='D1-D5'){ recovery+=0.2; complaint-=0.003; }
  if(s.stage==='D30-D60'){ recovery+=0.15; complaint+=0.008; manual+=0.18; }
  if(s.touch==='提醒强化'){ recovery+=0.18; roi+=0.05; }
  if(s.touch==='服务通知 + 红点'){ recovery+=0.12; complaint-=0.002; }
  if(s.deduct==='晚间补扣'){ recovery+=0.28; roi+=0.12; }
  if(s.deduct==='自然人补扣'){ recovery+=0.22; complaint+=0.004; }
  if(s.pressure==='支付限制灰度'){ recovery+=0.23; complaint+=0.008; }
  if(s.pressure==='征信预告'){ recovery+=0.14; complaint+=0.015; }
  if(s.manual==='24h 后升级人工'){ manual+=0.3; roi+=0.12; }
  if(s.manual==='协商页未提交升级'){ manual+=0.18; roi+=0.08; }
  return {recovery:recovery.toFixed(2), complaint:complaint.toFixed(3), roi:roi.toFixed(2), manual:manual.toFixed(2)};
}

        <div class="title">灰度前后效果对比</div>
        <div class="chart" id="releaseCompare"></div>
      </div>
    </div>
    <div class="grid equal">
      <div class="card">
        <div class="title">发布节奏时间线</div>
        <div class="timeline">${d.releaseTimeline.map(t=>`<div class="tl"><div class="left">${t[0]}</div><div class="right"><b>${t[1]}</b><br>${t[2]}</div></div>`).join('')}</div>
      </div>
      <div class="card">
        <div class="title">更真实的平台感来自哪里</div>
        <div class="panel"><h4>不是“展示当前策略”</h4><p>而是管理变更的全过程：谁提出、为什么改、影响哪些人、灰度多少、什么时候回滚、上线后看什么指标。</p></div>
        <div class="panel"><h4>这页能直观体现的价值</h4><ul><li>变更前就能看到收益与风险</li><li>变更中有灰度和审批</li><li>变更后能验证效果并沉淀复盘</li></ul></div>
      </div>
    </div>
  `;

  const c = initChart('releaseCompare');
  c.setOption({tooltip:{trigger:'axis'},legend:{top:4},grid:{left:48,right:28,top:40,bottom:28},xAxis:{type:'category',data:['短逾回收率','协商履约率','贷后类客诉率','人工升级命中率']},yAxis:[{type:'value',name:'%',min:0,max:100},{type:'value',name:'客诉率',min:0,max:.3}],series:[{name:'变更前',type:'bar',data:[d.compareBefore[0],d.compareBefore[1],0,d.compareBefore[3]],itemStyle:{color:'#cbd5e1',borderRadius:[6,6,0,0]}},{name:'变更后',type:'bar',data:[d.compareAfter[0],d.compareAfter[1],0,d.compareAfter[3]],itemStyle:{color:'#60a5fa',borderRadius:[6,6,0,0]}},{name:'客诉率(前)',type:'line',yAxisIndex:1,data:[null,null,d.compareBefore[2],null],symbolSize:10,lineStyle:{width:0},itemStyle:{color:'#f59e0b'}},{name:'客诉率(后)',type:'line',yAxisIndex:1,data:[null,null,d.compareAfter[2],null],symbolSize:10,lineStyle:{width:0},itemStyle:{color:'#ef4444'}}]});
}

function setAttribDim(key){ app.attribDim=key; app.attribSub=0; disposeCharts(); renderAttrib(); }
function setAttribSub(idx){ app.attribSub=idx; disposeCharts(); renderAttrib(); }
function renderAttrib(){
  const dims = d.attribDims;
  const curDim = dims.find(x=>x.key===app.attribDim) || dims[0];
  const curSub = curDim.subs[app.attribSub] || curDim.subs[0];
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="hero">
      <h2>🔍 回款归因分析：定位回款下降的根因维度</h2>
      <p>从6大维度（风险等级、用户画像、借款画像、逾期画像、人行画像、催收动作）交叉分析回款变化，每个维度下钻到子维度，找出对回款下降贡献最大的客群和动作断点，形成可执行的治理优先级。</p>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="title">维度选择</div>
      <div class="attrib-dims">
        ${dims.map(x=>`<div class="attrib-dim${x.key===app.attribDim?' active':''}" onclick="setAttribDim('${x.key}')">${x.icon} ${x.name}</div>`).join('')}
      </div>
      <div class="tabs">
        ${curDim.subs.map((s,i)=>`<div class="tab${i===app.attribSub?' active':''}" onclick="setAttribSub(${i})">${s.name}</div>`).join('')}
      </div>
    </div>
    <div class="attrib-summary">
      ${curSub.kpis.map(k=>`<div class="attrib-sum-card"><div class="lab">${k.l}</div><div class="val">${k.v}</div><div class="chg ${k.t}">${k.c}</div></div>`).join('')}
    </div>
    <div class="grid equal">
      <div class="card">
        <div class="title">趋势 / 分布</div>
        <div id="attribChart" class="chart"></div>
      </div>
      <div class="card">
        <div class="title">回款下降贡献度</div>
        <div class="contrib-bar">
          ${curSub.contribs.map(c=>`<div style="width:${c.pct}%;background:${c.color}" title="${c.name} ${c.pct}%">${c.pct}%</div>`).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px">
          ${curSub.contribs.map(c=>`<span style="font-size:11px;display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${c.color};display:inline-block"></span>${c.name} (${c.pct}%)</span>`).join('')}
        </div>
        <div id="attribPie" class="chart sm" style="margin-top:10px"></div>
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="title">明细数据</div>
      <div class="attrib-detail">
        <table>
          <thead><tr>${curSub.table.cols.map(c=>'<th>'+c+'</th>').join('')}</tr></thead>
          <tbody>${curSub.table.rows.map(r=>'<tr>'+r.map((v,ci)=>{
            if(ci===0) return '<td><b>'+v+'</b></td>';
            const isMoM = curSub.table.cols[ci]==='MoM';
            if(isMoM){
              const isNeg = v.includes('-');
              return '<td><span class="kpi-change '+(isNeg?'bad':'good')+'">'+v+'</span></td>';
            }
            return '<td>'+v+'</td>';
          }).join('')+'</tr>').join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="grid equal" style="margin-top:14px">
      <div class="attrib-insight">
        <h4>💡 归因洞察</h4>
        <p>${curSub.insight}</p>
      </div>
      <div class="attrib-action">
        <h4>🎯 建议动作</h4>
        <p>${curSub.action}</p>
      </div>
    </div>
  `;
  // render trend/distribution chart
  const cd = curSub.chartData;
  const isBar = cd.labels.length >= 5;
  const ch1 = initChart('attribChart');
  if(ch1){
    ch1.setOption({
      tooltip:{trigger:'axis'},
      legend:{data:['实际值','基线'],top:0,right:0,textStyle:{fontSize:11}},
      grid:{top:36,left:48,right:20,bottom:28},
      xAxis:{type:'category',data:cd.labels,axisLabel:{fontSize:11}},
      yAxis:{type:'value',axisLabel:{fontSize:11,formatter:v=>v+'%'}},
      series:[
        {name:'实际值',type:isBar?'bar':'line',data:cd.series,itemStyle:{color:'#2563eb'},barMaxWidth:32,smooth:true,areaStyle:isBar?undefined:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(37,99,235,.15)'},{offset:1,color:'rgba(255,255,255,0)'}]}}},
        {name:'基线',type:'line',data:cd.baseline,lineStyle:{type:'dashed',color:'#f97316',width:2},symbol:'none',itemStyle:{color:'#f97316'}}
      ]
    });
  }
  // render pie chart
  const ch2 = initChart('attribPie');
  if(ch2){
    ch2.setOption({
      tooltip:{trigger:'item',formatter:'{b}: {d}%'},
      series:[{
        type:'pie',radius:['40%','70%'],center:['50%','55%'],
        label:{fontSize:11,formatter:'{b}\n{d}%'},
        data:curSub.contribs.map(c=>({name:c.name,value:c.pct,itemStyle:{color:c.color}}))
      }]
    });
  }
}

render('control');
window.addEventListener('resize',()=>Object.values(charts).forEach(c=>{ try{ c.resize(); }catch(e){} }));
</script>
