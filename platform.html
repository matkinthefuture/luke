function askAgent(q){
app.chatMsgs.push({role:'user',text:q});
const preset=D.agentPresets.find(p=>p.q===q);
const answer=preset?preset.answer:'正在分析中...请稍候。\n\n（此为demo模式，实际使用中Agent会基于历史分析PPT风格和实时数据生成完整报告。）';
setTimeout(()=>{app.chatMsgs.push({role:'bot',text:answer});renderChat()},300);
renderChat();
}
function askCustom(){
const input=document.getElementById('agentInput');
const q=input.value.trim();if(!q)return;
input.value='';
askAgent(q);
}
function renderChat(){
const box=document.getElementById('chatBox');if(!box)return;
box.innerHTML=app.chatMsgs.map(m=>{
const isUser=m.role==='user';
const textHtml=m.text.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/## (.+?)(<br>|$)/g,'<h4 style="margin:8px 0 4px;font-size:14px">$1</h4>').replace(/### (.+?)(<br>|$)/g,'<h5 style="margin:6px 0 3px;font-size:13px">$1</h5>').replace(/\|(.+)\|/g,function(match){return'<div style="font-family:monospace;font-size:11px;background:#f8fbff;padding:2px 6px;border-radius:4px;margin:2px 0">'+match+'</div>'});
return`<div class="chat-msg ${isUser?'user':'bot'}"><div class="chat-avatar">${isUser?'👤':'🤖'}</div><div class="chat-bubble">${textHtml}</div></div>`}).join('');
box.scrollTop=box.scrollHeight;
}
